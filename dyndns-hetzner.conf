# /etc/dyndns-hetzner/dyndns-hetzner.conf
# Konfiguration für den Hetzner DynDNS Updater

# Domain für den DNS-Eintrag (z.B. meinedomain.de)
DOMAIN="example.com"

# Zone-ID aus dem Hetzner DNS Dashboard
ZONE="zone-id-hier-eintragen"

# API-Token aus der Hetzner DNS Console
AUTHENTICATION_TOKEN="dein-api-token-hier"

# Prüfintervall in Sekunden (Standard: 300 = 5 Minuten)
INTERVAL=300
